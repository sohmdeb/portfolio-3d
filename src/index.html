<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: rgb(0, 0, 0);
      margin: 0;
    }

    #webgl {
      pointer-events: none;
    }

    #ui-app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #ui {
      position: absolute;
      overflow: hidden;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }

    #monitor-videos {
      pointer-events: none;
      position: 'absolute';
      opacity: 0;
      width: 0;
      height: 0;
      top: 0;
      left: 0;

    }

    #css {
      cursor: pointer;
    }

    #ui-interactive {
      position: absolute;
      top: 0;
      left: 0;
      width: 256px;
    }

    video {
      position: absolute;
      top: 0;
      pointer-events: none;
    }
  </style>

  <!-- Primary Meta Tags -->
  <title>Soham Deb - Editing Portfolio</title>
  <meta name="title" content="Soham Deb - Video Editor & Creative">
  <meta name="description"
    content="I'm Soham, a Video Editor & Creative with 5+ years of experience crafting compelling visual stories.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sohamdeb.in/">
  <meta property="og:title" content="Soham Deb - Video Editor & Creative">
  <meta property="og:description"
    content="I'm Soham, a Video Editor & Creative with 5+ years of experience crafting compelling visual stories.">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary">
  <meta name="twitter:card" content="summary">

  <meta property="twitter:url" content="https://sohamdeb.in/">
  <meta name="twitter:url" content="https://sohamdeb.in/">

  <meta property="twitter:title" content="Soham Deb - Video Editor & Creative">
  <meta name="twitter:title" content="Soham Deb - Video Editor & Creative">

  <meta property="twitter:description"
    content="I'm Soham, a Video Editor & Creative with 5+ years of experience crafting compelling visual stories.">
  <meta name="twitter:description"
    content="I'm Soham, a Video Editor & Creative with 5+ years of experience crafting compelling visual stories.">

  <link rel="shortcut icon" href="../static/images/favicon.ico" type="image/x-icon">

  <!-- Analytics removed -->
</head>

<body>
  <div id="css"></div>
  <div id="webgl"></div>
  <div id="overlay"></div>
  <div id="ui-interactive"></div>
  <div id="ui"></div>
  <div id="monitor-videos">
    <video id="video-1" muted loop autoplay width="0" height="0" src="../static/textures/monitor/video/base-static.mp4"
      style="opacity: 0;"></video>
    <video id="video-2" muted loop autoplay width="0" height="0"
      src="../static/textures/monitor/video/static-texture-layer.mp4" style="opacity: 0;"></video>
  </div>

  <!-- Dark/Light Mode Toggle -->
  <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">☀️</button>
  <style>
    #theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    #theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    body {
      transition: background-color 0.6s ease;
    }
    body.dark-mode {
      background-color: rgb(15, 15, 20) !important;
    }
    body.dark-mode #webgl canvas,
    body.dark-mode #overlay canvas {
      filter: brightness(0.45) saturate(0.8);
      transition: filter 0.6s ease;
    }
    body:not(.dark-mode) #webgl canvas,
    body:not(.dark-mode) #overlay canvas {
      filter: brightness(1) saturate(1);
      transition: filter 0.6s ease;
    }
  </style>
  <script>
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('theme-toggle');
      body.classList.toggle('dark-mode');
      if (body.classList.contains('dark-mode')) {
        btn.textContent = '🌙';
        btn.style.background = 'rgba(255,255,255,0.15)';
      } else {
        btn.textContent = '☀️';
        btn.style.background = 'rgba(0,0,0,0.5)';
      }
    }
  </script>
</body>

</html>
